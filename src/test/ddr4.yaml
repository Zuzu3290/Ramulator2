Frontend:
  impl: LoadStoreTrace
  clock_ratio: 8        # CPU:DRAM = 8:1  →  ~4.8 GHz CPU / 600 MHz DDR4-2400
  num_expected_insts: 500000
  traces:
    - PLACEHOLDER_TRACE

  Translation:
    impl: RandomTranslation
    max_addr: 2147483648

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 3

  DRAM:
    impl: DDR4
    org:
      preset: DDR4_8Gb_x8
      channel: 1
      rank: 2
    timing:
      preset: DDR4_2400R

  Controller:
    impl: Generic
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    RowPolicy:
      impl: ClosedRowPolicy
      cap: 4
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh